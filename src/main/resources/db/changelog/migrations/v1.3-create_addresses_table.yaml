databaseChangeLog:
  - changeSet:
      id : v1.3-create-addresses-table
      author: cargoflow
      changes:
        - createTable:
            tableName: addresses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: country
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: zip
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: address
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: building_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false