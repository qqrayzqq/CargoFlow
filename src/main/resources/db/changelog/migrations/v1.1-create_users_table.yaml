databaseChangeLog:
  - changeSet:
      id: v1.1-create-users-table
      author: cargoflow
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true          # PostgreSQL: GENERATED ALWAYS AS IDENTITY
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true               # уникальный логин

              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true               # один аккаунт на имейл

              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false            # Spring Security сюда кладёт bcrypt хэш

              - column:
                  name: full_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: SHIPPER
                  constraints:
                    nullable: false

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true    # при регистрации аккаунт сразу активен
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMPTZ            # TIMESTAMPTZ хранит время с таймзоной (лучше чем TIMESTAMP)
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

        # CHECK constraint: role может быть только одним из трёх значений
        # Делаем через sql, потому что Liquibase YAML не имеет отдельного тега для CHECK
        - sql:
            sql: >
              ALTER TABLE users
              ADD CONSTRAINT chk_user_role
              CHECK (role IN ('SHIPPER', 'MANAGER', 'ADMIN'));
