databaseChangeLog:
  - changeSet:
      id: v1.1-create-users-table
      author: cargoflow
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: full_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: SHIPPER
                  constraints:
                    nullable: false

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

        - sql:
            sql: >
              ALTER TABLE users
              ADD CONSTRAINT chk_user_role
              CHECK (role IN ('SHIPPER', 'MANAGER', 'ADMIN'));
