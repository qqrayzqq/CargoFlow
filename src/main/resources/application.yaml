spring:
  application:
    name: cargoflow

  profiles:
    active: local   # использует application-local.yaml (не коммитится в git)

  # --- PostgreSQL DataSource ---
  datasource:
    url: jdbc:postgresql://localhost:5432/cargoflow
    username: cargoflow
    password: cargoflow
    driver-class-name: org.postgresql.Driver

  # --- jOOQ ---
  jooq:
    sql-dialect: POSTGRES

  # --- Liquibase: запускает SQL-миграции при старте приложения ---
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  # --- Elasticsearch ---
  elasticsearch:
    uris: http://localhost:9201

  # --- GraphQL ---
  graphql:
    graphiql:
      enabled: true      # включаем браузерный UI для тестирования GraphQL запросов
    http:
      path: /graphql

  # --- Spring Docker Compose: автоматически стартует compose.yaml при запуске приложения ---
  docker:
    compose:
      lifecycle-management: start-and-stop  # поднимает при старте, гасит при остановке

server:
  port: 8080

logging:
  level:
    root: WARN
    com.github.qqrayzqq.cargoflow : DEBUG
    liquibase: INFO
  file:
    name: logs/cargoflow.log

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

cargoflow:
  geocoding:
    base-url: https://nominatim.openstreetmap.org
  rate-per-kg: 0.01